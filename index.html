<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Bonus Point</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout-with-background">
    <div class="background-overlay"></div>
    <button id="themeToggle" class="logo-toggle"></button>
  </div>
      <tr>
  <div class="total">
    <table class="vlog">
      <td>
        <div class="left-cell">Получено: <span id="totalDisplay">0 BP</span></div>
      </td><td>
        <div class="right-cell">Осталось: <span id="remainingDisplay">0 BP</span></div>
      </td>
    </table>
      </tr>
      <tr>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
            <div class="progress-text">
              <span id="progressPercent">0%</span> выполнено
            </div>
          </div>
        </div>
      </tr>
  </div><br>
  
  <div class="header-right">
          <!-- VIP чекбокс -->
    <label class="custom-checkbox">
      <input type="checkbox" id="vipCheckbox">
        <span class="checkmark"></span>
        <span class="small">Platinum VIP</span>
    </label>

          <!-- X2 чекбокс -->
          <label class="custom-checkbox">
            <input type="checkbox" id="x2Checkbox">
            <span class="checkmark"></span>
            <span class="small">X2</span>
          </label>
      </div><br>

      <button id="resetBtn">Сбросить все</button><br>

    <div class="grid" id="tasksGrid">
      <div class="column easy-col">
        <table aria-label="Таблица заданий и наград" class="tasks-container">
          <thead><tr><th>Задания:</th></tr></thead>
          <table aria-label="Таблица заданий и наград" class="tasks-column">
          <tbody>
            <tr data-id="task1">
              <td class="status-cell">
                <label class="custom-checkbox" for="task1">
                  <input type="checkbox" class="task-checkbox" id="task1">
                  <span class="checkmark"></span>
                </label>
              </td>
              <td>
                <div class="task-item">
                  <span>Лотерея №1</span>
                </div>
              </td>
              <td class="lottery-cell">
                <div class="lottery-controls" data-target="5" data-id="lottery1">
                  <button class="arrow-btn up-arrow" type="button">↑</button>
                  <span class="quantity-display">0</span>
                  <button class="arrow-btn down-arrow" type="button">↓</button>
                </div>
              </td>
              <td class="reward" data-with="4" data-without="2">2 BP</td>
            </tr>
            <tr data-id="task2">
              <td class="status-cell">
                <label class="custom-checkbox" for="task2">
                  <input type="checkbox" class="task-checkbox" id="task2">
                  <span class="checkmark"></span>
                </label>
              </td>
              <td>
                <div class="task-item">
                  <span>Лотерея №2</span>
                </div>
              </td>
              <td class="lottery-cell">
                <div class="lottery-controls" data-target="3" data-id="lottery2">
                  <button class="arrow-btn up-arrow" type="button">↑</button>
                  <span class="quantity-display">0</span>
                  <button class="arrow-btn down-arrow" type="button">↓</button>
                </div>
              </td>
              <td class="reward" data-with="6" data-without="3">3 BP</td>
            </tr>
          </tbody>
          </table>
        </table>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
